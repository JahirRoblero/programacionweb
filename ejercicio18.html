<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 18</title>
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >
</head>
<body>

  <div class="encabezado text-center p-3">
    <h1>GESTOR DE ELEMENTOS</h1>
  </div>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <div class="card shadow">
          <div class="card-body">

            <h2 class="text-center mb-4">Agregar y eliminar elementos</h2>

            <form id="formularioElementos">
              <div class="mb-3">
                <label for="nuevoElemento" class="form-label">Escribe algo</label>
                <input 
                  type="text" 
                  id="nuevoElemento" 
                  class="form-control" 
                  placeholder="Escribe un elemento"
                  autofocus
                >
              </div>

              <button type="button" id="agregarBtn" class="btn btn-primary w-100">
                Agregar
              </button>
            </form>

            <h3 class="mt-4">Lista:</h3>

            <ul id="lista" class="list-group mt-3"></ul>

          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <script src="js/ejercicio18.js"></script>
</body>
</html>
