<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 13</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/ejercicio13.css">
</head>
<body>
    <div class="encabezado">
        <h1>
            SISTEMA PARA VERIFICAR SI PUEDES VOTAR O NO
        </h1>
    </div>
    
    <form class="formulario">
        <div class="contenedor">
            <label for="edad">Ingresa tu edad</label>
            <input type="number" id="edad" required autofocus>
            <button type="submit" onclick="verificar(event)">Verificar</button>

            <label>Tu resultado: </label>
            <input type="text" id="resultado" readonly>
            <button type="reset" onclick="limpiar()">Limpiar</button>
        </div>
    </form>

    <footer>
        <p>GOMEZ ROBLERO ANGEL JAHIR</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio13.js"></script>
</body>
</html>
