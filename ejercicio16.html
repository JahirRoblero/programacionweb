<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 16</title>
    <link rel="stylesheet" href="css/ejercicio16.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/ejercicio12.css">
  </head>
  <body>
    <div class="encabezado">
      <h1>CALCULADORA</h1>
    </div>

    <form class="formulario">
      <div class="contenedor">
        <label>Ingresa el primer numero</label>
        <input type="text" id="numero1" autofocus />
        <label>Ingresa el segundo numero</label>
        <input type="text" id="numero2" autofocus />
        
        <button id="sumar" type="button" onclick="calcularOperacion('suma')">
          Sumar
        </button>
        <button id="restar" type="button" onclick="calcularOperacion('resta')">
          Restar
        </button>
        <button
          id="multiplicar"
          type="button"
          onclick="calcularOperacion('multiplicacion')"
        >
          Multiplicar
        </button>
        <button
          id="dividir"
          type="button"
          onclick="calcularOperacion('division')"
        >
          Dividir
        </button>
        <label>Resultado de la operación</label>
        <input type="text" id="resultado" readonly required />
        <button id="limpiar" onclick="limpiar()">Limpiar</button>
      </div>
    </form>

    <footer class="foot">
      <p>Gomez Roblero Angel Jahir</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio16.js"></script>
  </body>
</html>
