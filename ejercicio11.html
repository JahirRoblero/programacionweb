<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
     <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
</head>
<body>

    <div class="encabezado">
        <h1>CALCULADORA DE <span class="kilometros">KILOMETROS A MILLAS</span></h1>
    </div>

    <div class="contenedor-menu">
      <a class="boton-menu" href="index.html">Volver al menu</a>
    </div>

    <form class="formulario">
        <div class="contenedor">
            <label>Ingresa la distancia en kilometros</label>
            <input type="number" id="valorKilometros" autofocus>
            <button id="convertir" type="submit" onclick="calcular(event)">Convertir</button>
    
            <label>Resultado distancia en millas: </label>
            <input type="text" id="valorMillas" readonly required>
            <button id="limpiar" onclick="limpiar()">Limpiar</button>
        </div>
    </form>

    <footer class="foot">
        <p>Gomez Roblero Angel Jahir</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio11.js"></script>
</body>
</html>
