     <div class="contenedor-menu">

    <form class="formulario">

            <label for="pesosMexicanos">Ingresa la cantidad en pesos Mexicanos</label>

            <button type="submit" id="convertir" onclick="calcular(event)">Convertir</button>
    
            <label>Valor en dólares</label>
            <input type="text" id="dolares" readonly>
            <button>Limpiar</button>
        </div>
    </form>
